spring:
  application:
    name: barbers

  datasource:
    url: jdbc:h2:mem:barbers
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
    show-sql: false
    open-in-view: false

app:
  jwt:
    secret: mySecretKeyThatIsAtLeast256BitsLongForHS256AlgorithmRequirements123456789012
    expiration: 86400000 # 24 hours in milliseconds

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
server:
  port: 8080
