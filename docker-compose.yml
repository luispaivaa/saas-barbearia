version: '3.9'

services:
  barberstore:
    build: .
    container_name: barberstore
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - SPRING_PROFILES_ACTIVE=production
    restart: unless-stopped
    networks:
      - barber-network

networks:
  barber-network:
    driver: bridge
